<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LLM Council</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --bg-deep: #0b1220;
      --border: #334155;
      --border-light: #1f2937;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-faint: #64748b;
      --text-muted: #475569;
      --accent-purple: #7c3aed;
      --accent-purple-light: #a78bfa;
      --accent-cyan: #22d3ee;
      --accent-green: #34d399;
      --accent-yellow: #fbbf24;
      --accent-red: #f87171;
      --model-claude: #7c3aed;
      --model-gpt: #059669;
      --model-gemini: #d97706;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text); padding: 0; line-height: 1.5; }

    /* Layout */
    .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .header .tag { font-size: 11px; background: var(--accent-purple); color: white; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* Controls */
    .controls { background: var(--bg-card); border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .controls-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    label.ctrl { font-size: 13px; color: var(--text-dim); font-weight: 500; display: block; margin-bottom: 4px; }
    select, input[type="password"], textarea {
      width: 100%; font-size: 13px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg-input); color: var(--text); padding: 8px 10px; outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent-purple); }
    textarea { min-height: 80px; resize: vertical; font-family: monospace; font-size: 12px; }
    .checkbox-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .checkbox-row label { font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
    .checkbox-row input[type="checkbox"] { accent-color: var(--accent-purple); }
    .btn-run {
      background: var(--accent-purple); color: white; border: none; padding: 10px 28px;
      border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-run:hover { background: #6d28d9; }
    .btn-run:active { transform: scale(0.98); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      background: var(--bg-input); color: var(--text-dim); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 5px; font-size: 12px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-sm:hover { border-color: var(--accent-purple); color: var(--text); }

    /* Progress */
    .progress-bar { display: none; margin-bottom: 20px; }
    .progress-bar.active { display: block; }
    .progress-track { background: var(--bg-card); border-radius: 8px; padding: 16px 20px; border: 1px solid var(--border); }
    .progress-stages { display: flex; gap: 4px; margin-bottom: 10px; }
    .progress-stage {
      flex: 1; height: 4px; border-radius: 2px; background: var(--border);
      transition: background 0.3s;
    }
    .progress-stage.done { background: var(--accent-green); }
    .progress-stage.active { background: var(--accent-purple); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .progress-label { font-size: 13px; color: var(--text-dim); }
    .progress-label strong { color: var(--accent-purple-light); }

    /* Results area */
    .results-empty { text-align: center; padding: 60px 20px; color: var(--text-faint); }
    .results-empty .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

    /* Verdict hero */
    .verdict-hero {
      background: linear-gradient(135deg, #1a1040 0%, #1e293b 100%);
      border: 1px solid var(--accent-purple); border-radius: 10px;
      padding: 24px; margin-bottom: 20px;
    }
    .verdict-hero .verdict-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .verdict-hero .verdict-title { font-size: 14px; font-weight: 600; color: var(--accent-purple-light); text-transform: uppercase; letter-spacing: 0.5px; }
    .verdict-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .verdict-badge.unanimous { background: #064e3b; color: var(--accent-green); }
    .verdict-badge.majority { background: #164e63; color: var(--accent-cyan); }
    .verdict-badge.contested { background: #78350f; color: var(--accent-yellow); }
    .verdict-badge.unstable { background: #7f1d1d; color: var(--accent-red); }
    .verdict-badge.confirmed { background: #064e3b; color: var(--accent-green); }
    .verdict-badge.disputed { background: #78350f; color: var(--accent-yellow); }
    .verdict-badge.clean { background: #164e63; color: var(--accent-cyan); }
    .verdict-badge.inconclusive { background: #7f1d1d; color: var(--accent-red); }
    .confidence-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
    }
    .confidence-badge.high { background: #064e3b; color: var(--accent-green); }
    .confidence-badge.moderate { background: #78350f; color: var(--accent-yellow); }
    .confidence-badge.low { background: #7f1d1d; color: var(--accent-red); }
    .verdict-text { font-size: 16px; line-height: 1.6; color: var(--text); margin-bottom: 8px; }
    .verdict-basis { font-size: 12px; color: var(--text-faint); }
    .verdict-unresolved {
      font-size: 16px; color: var(--accent-red); font-weight: 600;
      background: rgba(248, 113, 113, 0.08); border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 6px; padding: 12px 16px; margin-top: 4px;
    }

    /* Question cards */
    .question-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 16px; overflow: hidden;
    }
    .question-header {
      padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; transition: background 0.15s;
    }
    .question-header:hover { background: rgba(255,255,255,0.02); }
    .question-header .q-title { font-size: 14px; font-weight: 600; flex: 1; }
    .question-header .q-meta { display: flex; gap: 8px; align-items: center; }
    .question-header .chevron {
      color: var(--text-faint); transition: transform 0.2s; font-size: 14px;
    }
    .question-card.open .chevron { transform: rotate(180deg); }
    .question-body { display: none; border-top: 1px solid var(--border-light); padding: 18px; }
    .question-card.open .question-body { display: block; }

    /* Consensus bar */
    .consensus-bar {
      background: var(--bg-deep); border-radius: 6px; padding: 10px 14px;
      margin-bottom: 14px; font-size: 13px;
    }
    .consensus-bar strong { color: var(--accent-cyan); }

    /* Model reply cards */
    .reply-card {
      background: var(--bg-deep); border: 1px solid var(--border-light); border-radius: 8px;
      padding: 14px; margin-bottom: 10px; position: relative;
      border-left: 3px solid transparent;
    }
    .reply-card.is-strongest { border-left-color: var(--accent-cyan); }
    .reply-card.is-weakest { border-left-color: var(--accent-red); opacity: 0.85; }
    .reply-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .reply-model { font-weight: 700; font-size: 14px; }
    .reply-score { font-size: 24px; font-weight: 800; }
    .reply-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .reply-badges .tag {
      font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .tag-compliant { background: #064e3b; color: var(--accent-green); }
    .tag-noncompliant { background: #7f1d1d; color: var(--accent-red); }
    .tag-strongest { background: #164e63; color: var(--accent-cyan); }
    .tag-weakest { background: #7f1d1d; color: var(--accent-red); }
    .tag-flip { background: #78350f; color: var(--accent-yellow); }
    .tag-held { background: #064e3b; color: var(--accent-green); }
    .tag-conviction { background: #1e1b4b; color: var(--accent-purple-light); }
    .tag-flaw { background: #451a03; color: #fb923c; }
    .reply-text { font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
    .reply-original { font-size: 12px; color: var(--text-faint); margin-bottom: 6px; font-style: italic; }

    /* Axis score bars */
    .axes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .axis-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .axis-label { width: 80px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
    .axis-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .axis-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .axis-val { width: 16px; font-weight: 700; color: var(--text); }

    /* Score comparison */
    .score-compare { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-end; }
    .score-compare-item { flex: 1; text-align: center; }
    .score-compare-bar { height: 4px; border-radius: 2px; margin-bottom: 4px; transition: width 0.4s; }
    .score-compare-name { font-size: 11px; color: var(--text-dim); font-weight: 600; }
    .score-compare-val { font-size: 18px; font-weight: 800; }

    /* Rebuttal section */
    .rebuttal-section { margin-top: 8px; margin-bottom: 8px; }
    .rebuttal-text { font-size: 12px; color: var(--accent-yellow); padding: 6px 10px; background: rgba(251, 191, 36, 0.06); border-radius: 4px; border-left: 2px solid var(--accent-yellow); }
    .rebuttal-label { font-size: 10px; color: var(--text-faint); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Phase 1 detail */
    .phase1-detail { font-size: 12px; color: var(--text-dim); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-light); }

    /* Export bar */
    .export-bar { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
    .findings-box {
      background: var(--bg-deep); border-radius: 6px; padding: 12px 14px;
      margin-bottom: 14px; font-size: 13px; border: 1px solid var(--border-light);
    }
    .findings-box strong { color: var(--accent-cyan); }
    .findings-box ul { margin: 8px 0 0 18px; }
    .findings-box li { margin-bottom: 6px; }

    /* Error */
    .error-box { background: #7f1d1d; border: 1px solid var(--accent-red); border-radius: 8px; padding: 16px; color: var(--accent-red); }
    .error-box pre { background: transparent; border: none; padding: 0; color: inherit; font-size: 12px; margin-top: 8px; }

    /* Dashboard */
    .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .dash-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .dash-stat-value { font-size: 28px; font-weight: 800; }
    .dash-stat-label { font-size: 12px; color: var(--text-faint); margin-top: 4px; }
    .dash-stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .dash-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
    .dash-table th { text-align: left; padding: 8px 10px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
    .dash-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-light); }
    .dash-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
    .dash-section h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }

    /* Responsive */
    @media (max-width: 700px) {
      .controls-grid { grid-template-columns: 1fr; }
      .axes-grid { grid-template-columns: 1fr; }
      .progress-stages { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>LLM Council</h1>
    <span class="tag">SISTM</span>
  </div>

  <div class="container">
    <!-- Controls -->
    <div class="controls">
      <div class="controls-grid">
        <div>
          <label class="ctrl" for="councilMode">Council Mode</label>
          <select id="councilMode">
            <option value="sistm_stress" selected>SISTM Stress Test</option>
            <option value="code_review">Code Review</option>
            <option value="research_synthesis">Research Synthesis</option>
            <option value="legal_analysis">Legal Analysis</option>
            <option value="threat_assessment">Threat Assessment</option>
          </select>
        </div>
        <div>
          <label class="ctrl" for="mode" id="modeLabel">Domain</label>
          <select id="mode"></select>
        </div>
        <div>
          <label class="ctrl" for="apiKey">API Key (optional)</label>
          <input id="apiKey" type="password" placeholder="X-API-Key">
        </div>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" id="rebuttalChk"> Rebuttal</label>
        <label><input type="checkbox" id="refineChk"> Refine / Flip</label>
        <label><input type="checkbox" id="reverseRebChk"> Reverse order</label>
      </div>
      <div style="margin-top:8px;">
        <label class="ctrl" for="jsonl" id="inputLabel">Custom JSONL</label>
        <textarea id="jsonl" placeholder='{"role":"user","content":"In one sentence: ..."}'></textarea>
      </div>
      <div style="margin-top:12px; display:flex; align-items:center; gap:12px;">
        <button class="btn-run" id="runBtn">Run Council</button>
        <span id="runStatus" style="font-size:12px; color:var(--text-faint);"></span>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar" id="progressBar">
      <div class="progress-track">
        <div class="progress-stages" id="progressStages"></div>
        <div class="progress-label" id="progressLabel">Initializing...</div>
      </div>
    </div>

    <!-- View tabs -->
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn-sm" id="tabResults" style="border-color:var(--accent-purple);color:var(--text);" onclick="showTab('results')">Results</button>
      <button class="btn-sm" id="tabDashboard" onclick="showTab('dashboard')">Dashboard</button>
      <div style="flex:1;"></div>
      <div class="export-bar" id="exportBar" style="display:none;">
        <button class="btn-sm" id="exportNdjsonBtn">NDJSON</button>
        <button class="btn-sm" id="exportGroupedBtn">Grouped</button>
        <button class="btn-sm" id="exportSummaryBtn">Summary</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="results-empty">
        <div class="icon">&#9878;</div>
        <div>Select a domain and run the council</div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none;">
      <div class="results-empty" id="dashboardLoading">
        <div>Loading aggregate data...</div>
      </div>
      <div id="dashboardContent" style="display:none;"></div>
    </div>
  </div>

const PIPELINE_STAGES = [
  'Council Generation', 'Rebuttal', 'Refine', 'Phase 1',
  'Phase 2', 'Axis Scoring', 'Verdict'
];

let lastPayload = null;
let sseSource = null;

const $ = id => document.getElementById(id);
function authHeaders() {
  const k = $('apiKey').value.trim();
  return k ? { 'X-API-Key': k } : {};
}

function sseUrl(jobId) {
  const k = $('apiKey').value.trim();
  const url = new URL(`/api/run_stream/${jobId}`, window.location.origin);
  if (k) url.searchParams.set('api_key', k);
  return url.toString();
}

function modelColor(name) { return MODEL_COLORS[name] || '#94a3b8'; }
function modelShort(name) { return MODEL_SHORT[name] || name.split('/').pop(); }
function activeCouncilMode() { return $('councilMode').value || 'sistm_stress'; }
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function setErrorBox(container, title, detail) {
  container.innerHTML = `<div class="error-box"><strong>${escapeHtml(title)}</strong><pre>${escapeHtml(detail || 'Unknown error')}</pre></div>`;
}

function rebuildModeOptions(modeKey) {
  const select = $('mode');
  const options = PRESETS_BY_MODE[modeKey] || PRESETS_BY_MODE.sistm_stress;
  const previous = select.value;
  select.innerHTML = '';
  options.forEach(([value, label]) => {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = label;
    select.appendChild(opt);
  });
  const hasPrevious = options.some(([value]) => value === previous);
  select.value = hasPrevious ? previous : options[0][0];
}

function syncModeUI() {
  const modeKey = activeCouncilMode();
  const meta = MODE_META[modeKey] || MODE_META.sistm_stress;
  rebuildModeOptions(modeKey);
  document.querySelector('.header .tag').textContent = meta.label;
  $('modeLabel').textContent = meta.modeLabel;
  $('inputLabel').textContent = meta.inputLabel;
  $('jsonl').placeholder = meta.placeholder;
}

// ── Progress ──

function showProgress(stages) {
  const bar = $('progressBar');
  const stagesEl = $('progressStages');
  bar.classList.add('active');
  stagesEl.innerHTML = '';
  stages.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'progress-stage';
    el.title = s;
    stagesEl.appendChild(el);
  });
}

function updateProgress(stageIndex, label) {
  const stages = $('progressStages').children;
  for (let i = 0; i < stages.length; i++) {
    stages[i].className = 'progress-stage' + (i < stageIndex ? ' done' : (i === stageIndex ? ' active' : ''));
  }
  $('progressLabel').innerHTML = label;
}

function hideProgress() {
  $('progressBar').classList.remove('active');
}

// ── SSE listener (GET /api/run_stream/<job_id>) ──

function connectSSE(jobId) {
  if (sseSource) sseSource.close();
  try {
    sseSource = new EventSource(sseUrl(jobId));
    // Map backend event names to stage keys
    const EVENT_TO_STAGE = {
      run_start: 'generation',
      model_start: 'generation',
      question_start: 'generation',
      rebuttal_start: 'rebuttal',
      refine_start: 'refine',
      phase1_start: 'phase1',
      phase2_start: 'phase2',
      axis_scoring_start: 'scoring',
      verdict_start: 'verdict',
    };

    sseSource.addEventListener('progress', (e) => {
      try {
        const d = JSON.parse(e.data);
        const stageKey = EVENT_TO_STAGE[d.event];
        if (stageKey) {
          const cm = activeCouncilMode();
          const sv = (window.STAGE_VERBS || {})[cm] || (window.STAGE_VERBS || {}).sistm_stress || {};
          const verb = sv[stageKey];
          // Find the index of this stage in the active stages
          const stageKeys = window._activeStageKeys || [];
          const idx = stageKeys.indexOf(stageKey);
          if (idx >= 0 && verb) {
            updateProgress(idx, `<strong>${verb[0]}</strong> — ${verb[1]}`);
          } else if (idx >= 0) {
            updateProgress(idx, `<strong>${stageKey}</strong>`);
          }
        }
      } catch (err) {}
    });
    sseSource.addEventListener('status', (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.status === 'running') {
          const cm = activeCouncilMode();
          const sv = (window.STAGE_VERBS || {})[cm] || (window.STAGE_VERBS || {}).sistm_stress || {};
          const gen = sv.generation;
          if (gen) updateProgress(0, `<strong>${gen[0]}</strong> — ${gen[1]}`);
        }
      } catch (err) {}
    });
    sseSource.addEventListener('complete', () => {
      if (sseSource) { sseSource.close(); sseSource = null; }
    });
    sseSource.addEventListener('error', () => {
      if (sseSource) { sseSource.close(); sseSource = null; }
    });
    sseSource.onerror = () => { if (sseSource) { sseSource.close(); sseSource = null; } };
  } catch (err) {
    // SSE not available yet; progress will just show running
  }
}

// ── Run ──

$('runBtn').onclick = async () => {
  const btn = $('runBtn');
  btn.disabled = true;
  $('runStatus').textContent = '';
  $('results').innerHTML = '';
  $('exportBar').style.display = 'none';

  const mode = $('mode').value;
  const councilMode = activeCouncilMode();
  const body = {
    mode,
    council_mode: councilMode,
    rebuttal: $('rebuttalChk').checked,
    refine: $('refineChk').checked,
    reverse_rebuttal: $('reverseRebChk').checked,
  };
  if (mode === 'custom') {
    const input = $('jsonl').value.trim();
    if (!input) {
      const msg =
        councilMode === 'code_review' ? 'Code review mode requires pasted code.' :
        (councilMode === 'research_synthesis' || councilMode === 'legal_analysis') ? 'This mode requires a question.' :
        councilMode === 'threat_assessment' ? 'Threat assessment mode requires a system description.' :
        'Custom mode requires JSONL input.';
      setErrorBox($('results'), 'Input error', msg);
      btn.disabled = false;
      return;
    }
    if (councilMode === 'code_review' || councilMode === 'research_synthesis' || councilMode === 'legal_analysis' || councilMode === 'threat_assessment') body.code = input;
    else body.jsonl = input;
  }

  // Mode-specific stage verbs (defined at module scope, referenced by SSE handler)
  if (!window.STAGE_VERBS) window.STAGE_VERBS = {
    sistm_stress: {
      generation: ['Querying council', 'Each model answering independently...'],
      rebuttal: ['Challenging positions', 'Each model rebutting the others...'],
      refine: ['Defending or revising', 'Each model responding to rebuttals...'],
      phase1: ['Labeling flaws', 'Adjudicator evaluating each reply...'],
      phase2: ['Extracting consensus', 'Adjudicator ranking replies...'],
      scoring: ['Scoring axes', 'Evaluating structural, empirical, rhetorical quality...'],
      verdict: ['Rendering verdict', 'Classifying outcome and synthesizing...'],
    },
    code_review: {
      generation: ['Reviewing code', 'Each model reviewing independently...'],
      rebuttal: ['Challenging reviews', 'Each model disputing the others\' findings...'],
      refine: ['Revising reviews', 'Each model updating after peer critique...'],
      phase1: ['Classifying findings', 'Adjudicator labeling each finding...'],
      phase2: ['Merging findings', 'Deduplicating and flagging disagreements...'],
      scoring: ['Scoring review quality', 'Evaluating bug ID, evidence, fix quality...'],
      verdict: ['Delivering findings', 'Rendering confirmed vs disputed...'],
    },
    research_synthesis: {
      generation: ['Gathering evidence', 'Each model producing its analysis...'],
      rebuttal: ['Challenging evidence', 'Each model citing counter-evidence...'],
      refine: ['Revising analysis', 'Each model incorporating critiques...'],
      phase1: ['Evaluating sources', 'Adjudicator assessing evidence quality...'],
      phase2: ['Comparing evidence', 'Adjudicator weighing agreement across analyses...'],
      scoring: ['Scoring evidence quality', 'Evaluating citation, causation, uncertainty...'],
      verdict: ['Synthesizing conclusion', 'Rendering supported vs contested...'],
    },
    legal_analysis: {
      generation: ['Counsel submitting briefs', 'Each model analyzing independently...'],
      rebuttal: ['Cross-examining', 'Each model challenging the others\' reasoning...'],
      refine: ['Amending briefs', 'Each model addressing objections...'],
      phase1: ['Evaluating authority', 'Adjudicator checking statutory grounding...'],
      phase2: ['Comparing authorities', 'Adjudicator weighing cited precedent...'],
      scoring: ['Scoring legal reasoning', 'Evaluating authority, application, precision...'],
      verdict: ['Rendering judgment', 'Classifying settled vs contested...'],
    },
    threat_assessment: {
      generation: ['Scanning attack surface', 'Each model assessing independently...'],
      rebuttal: ['Challenging assessments', 'Each model disputing threat severity...'],
      refine: ['Revising assessment', 'Each model updating after peer review...'],
      phase1: ['Classifying threats', 'Adjudicator labeling each finding...'],
      phase2: ['Merging threat intel', 'Deduplicating and assessing posture...'],
      scoring: ['Scoring threat analysis', 'Evaluating exploitability, impact, mitigation...'],
      verdict: ['Issuing assessment', 'Rendering confirmed vs disputed threats...'],
    },
  };

  const STAGE_VERBS = window.STAGE_VERBS;
  const verbs = STAGE_VERBS[councilMode] || STAGE_VERBS.sistm_stress;
  const stageKeys = ['generation'];
  if (body.rebuttal) stageKeys.push('rebuttal');
  if (body.refine) stageKeys.push('refine');
  stageKeys.push('phase1', 'phase2', 'scoring', 'verdict');
  window._activeStageKeys = stageKeys;  // expose for SSE handler
  const stages = stageKeys.map(k => verbs[k][0]);
  showProgress(stages);
  updateProgress(0, `<strong>${verbs.generation[0]}</strong> — ${verbs.generation[1]}`);

  const startTime = Date.now();
  const timer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    $('runStatus').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 1000);

  try {
    // Submit — returns job_id immediately
    const res = await fetch('/api/run_async', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify(body),
    });
    const submitResult = await res.json();

    if (!res.ok || submitResult.error || !submitResult.job_id) {
      clearInterval(timer);
      hideProgress();
      setErrorBox($('results'), 'Submit failed', submitResult.detail || submitResult.error || 'Unknown error');
      btn.disabled = false;
      return;
    }

    const jobId = submitResult.job_id;

    // Connect SSE for live progress
    connectSSE(jobId);

    // Poll for completion
    const pollResult = async () => {
      while (true) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const pollRes = await fetch(`/api/run_result/${jobId}`, { headers: authHeaders() });
          const pollData = await pollRes.json();
          if (pollData.done) {
            lastPayload = pollData;
            clearInterval(timer);
            hideProgress();
            if (sseSource) { sseSource.close(); sseSource = null; }
            $('runStatus').textContent = '';

            if (pollData.returncode !== 0 || !pollData.data || pollData.data.error) {
              setErrorBox($('results'), 'Run failed', pollData.stderr || pollData.data?.error || 'Unknown error');
            } else {
              renderResults(pollData.data);
              $('exportBar').style.display = 'flex';
            }
            btn.disabled = false;
            return;
          }
        } catch (err) {
          // poll failed, keep trying
        }
      }
    };
    pollResult();

  } catch (e) {
    clearInterval(timer);
    hideProgress();
    setErrorBox($('results'), 'Request failed', String(e));
    btn.disabled = false;
  }
};

// ── Render ──

function renderResults(data) {
  const container = $('results');
  container.innerHTML = '';

  if (!data.questions || !data.questions.length) {
    container.innerHTML = '<div class="results-empty">No results returned.</div>';
    return;
  }

  // Render each question
  data.questions.forEach((q, qi) => {
    // Verdict hero — show for each question
    const verdict = q.verdict;
    if (verdict) {
      container.appendChild(renderVerdict(verdict, qi));
    }

    // Question card
    const card = document.createElement('div');
    card.className = 'question-card' + (qi === 0 ? ' open' : '');

    // Header
    const header = document.createElement('div');
    header.className = 'question-header';
    const strongest = q.strongest_weighted;
    const weakest = q.weakest_weighted;
    header.innerHTML = `
      <div class="q-title">Q${q.question_index}: ${escapeHtml(truncate(q.question_text, 120))}</div>
      <div class="q-meta">
        ${strongest ? `<span style="color:${modelColor(strongest)};font-size:12px;font-weight:600;">${escapeHtml(modelShort(strongest))}</span>` : ''}
        <span class="chevron">&#9660;</span>
      </div>`;
    header.onclick = () => card.classList.toggle('open');
    card.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'question-body';

    // Consensus
    const mergedFindings = q.phase2?.merged_findings;
    if (Array.isArray(mergedFindings) && mergedFindings.length) {
      const fb = document.createElement('div');
      fb.className = 'findings-box';
      fb.innerHTML = `<strong>Findings:</strong><ul>${mergedFindings.map(f => `<li><strong>${escapeHtml(f.severity || 'unknown')}</strong> · ${escapeHtml(f.status || 'unknown')} · ${escapeHtml(f.finding || '')}</li>`).join('')}</ul>`;
      body.appendChild(fb);
    }
    const consensus = q.phase2?.consensus;
    if (consensus) {
      const cb = document.createElement('div');
      cb.className = 'consensus-bar';
      cb.innerHTML = `<strong>Consensus:</strong> ${escapeHtml(consensus)}`;
      body.appendChild(cb);
    }

    // Sort replies by weighted score
    const replies = [...(q.replies || [])].sort((a, b) => (b.weighted_score || 0) - (a.weighted_score || 0));

    // Score comparison bar
    if (replies.length >= 2) {
      const maxScore = Math.max(...replies.map(r => r.weighted_score || 0), 1);
      const compare = document.createElement('div');
      compare.className = 'score-compare';
      replies.forEach(r => {
        const pct = ((r.weighted_score || 0) / maxScore * 100).toFixed(0);
        const color = modelColor(r.model);
        compare.innerHTML += `<div class="score-compare-item">
          <div class="score-compare-bar" style="width:${pct}%;background:${color};margin:0 auto;"></div>
          <div class="score-compare-val" style="color:${color}">${(r.weighted_score || 0).toFixed(1)}</div>
          <div class="score-compare-name">${escapeHtml(modelShort(r.model))}</div>
        </div>`;
      });
      body.appendChild(compare);
    }

    replies.forEach(r => {
      body.appendChild(renderReply(r, strongest, weakest));
    });

    card.appendChild(body);
    container.appendChild(card);
  });
}

function renderVerdict(v, qi) {
  const el = document.createElement('div');
  el.className = 'verdict-hero';

  const vtype = v.verdict_type || 'unknown';
  const conf = v.confidence || 'low';

  let inner = `
    <div class="verdict-header">
      <span class="verdict-title">Council Verdict — Q${qi + 1}</span>
      <span class="verdict-badge ${vtype}">${escapeHtml(vtype)}</span>
      <span class="confidence-badge ${conf}">${escapeHtml(conf)} confidence</span>
    </div>`;

  if (v.verdict) {
    inner += `<div class="verdict-text">${escapeHtml(v.verdict)}</div>`;
    const counts = [];
    if (v.findings_count !== undefined) counts.push(`${v.findings_count} findings`);
    if (v.confirmed_bugs !== undefined) counts.push(`${v.confirmed_bugs} confirmed`);
    if (v.disputed !== undefined) counts.push(`${v.disputed} disputed`);
    inner += `<div class="verdict-basis">Basis: ${escapeHtml(v.basis || '')}${v.reason ? ' &middot; ' + escapeHtml(v.reason) : ''}${counts.length ? ' &middot; ' + escapeHtml(counts.join(' · ')) : ''}</div>`;
  } else {
    inner += `<div class="verdict-unresolved">${escapeHtml(v.reason || 'Insufficiently stable to render confidently')}</div>`;
  }
  el.innerHTML = inner;
  return el;
}

function renderReply(r, strongest, weakest) {
  const card = document.createElement('div');
  card.className = 'reply-card';
  const color = modelColor(r.model);
  const score = r.weighted_score || 0;
  const isStrongest = r.model === strongest;
  const isWeakest = r.model === weakest;
  if (isStrongest) card.classList.add('is-strongest');
  if (isWeakest) card.classList.add('is-weakest');
  const flip = (r.flip && typeof r.flip === 'object') ? r.flip : { flip: false };
  const flipped = flip.flip || (typeof r.flip === 'boolean' && r.flip);
  const flipReason = flip.flip_reason || r.flip_reason || '';
  const flipSource = flip.flip_source || r.flip_source || '';

  // Header with model name and score
  const header = document.createElement('div');
  header.className = 'reply-header';
  header.innerHTML = `
    <span class="reply-model" style="color:${color}">${escapeHtml(modelShort(r.model))}</span>
    <span class="reply-score" style="color:${color}">${score.toFixed(1)}</span>`;
  card.appendChild(header);

  // Badges
  const badges = document.createElement('div');
  badges.className = 'reply-badges';
  badges.innerHTML =
    `<span class="tag ${r.compliant ? 'tag-compliant' : 'tag-noncompliant'}">${r.compliant ? 'Compliant' : 'Noncompliant'}</span>` +
    (isStrongest ? '<span class="tag tag-strongest">Strongest</span>' : '') +
    (isWeakest ? '<span class="tag tag-weakest">Weakest</span>' : '') +
    (flipped ? `<span class="tag tag-flip">Flip: ${escapeHtml(flipReason)}${flipSource ? ' ← ' + escapeHtml(modelShort(flipSource)) : ''}</span>` : '<span class="tag tag-held">Held</span>') +
    (r.conviction_bonus !== null && r.conviction_bonus !== undefined ? `<span class="tag tag-conviction">Conv: ${r.conviction_bonus > 0 ? '+' : ''}${r.conviction_bonus}</span>` : '');

  // Phase 1 flaws
  const phase1 = r.phase1 || [];
  (Array.isArray(phase1) ? phase1 : [phase1]).forEach(p => {
    if (p && p.flaw_label) {
      badges.innerHTML += `<span class="tag tag-flaw">${escapeHtml(p.flaw_label)}</span>`;
    }
  });
  card.appendChild(badges);

  // Original text (if different from final)
  if (r.original_text && r.original_text !== r.text) {
    const orig = document.createElement('div');
    orig.className = 'reply-original';
    orig.textContent = 'Original: ' + r.original_text;
    card.appendChild(orig);
  }

  // Reply text
  const text = document.createElement('div');
  text.className = 'reply-text';
  text.textContent = r.text || '';
  card.appendChild(text);

  // Rebuttal (if present)
  if (r.rebuttal_text) {
    const rebSection = document.createElement('div');
    rebSection.className = 'rebuttal-section';
    const rebLabel = document.createElement('div');
    rebLabel.className = 'rebuttal-label';
    rebLabel.textContent = 'Rebuttal' + (r.rebuttal_target ? ' (targeting ' + modelShort(r.rebuttal_target) + ')' : '');
    rebSection.appendChild(rebLabel);
    const rebText = document.createElement('div');
    rebText.className = 'rebuttal-text';
    rebText.textContent = r.rebuttal_text;
    rebSection.appendChild(rebText);
    card.appendChild(rebSection);
  }

  // Axis scores
  const axes = r.axis_scores || r.axes || {};
  if (Object.keys(axes).length) {
    const grid = document.createElement('div');
    grid.className = 'axes-grid';
    for (const [axis, obj] of Object.entries(axes)) {
      if (!obj || obj.score === undefined) continue;
      const pct = (obj.score / 5) * 100;
      const axColor = AXIS_COLORS[axis] || '#94a3b8';
      grid.innerHTML += `
        <div class="axis-row">
          <span class="axis-label">${escapeHtml(AXIS_SHORT[axis] || axis)}</span>
          <div class="axis-track"><div class="axis-fill" style="width:${pct}%;background:${axColor}"></div></div>
          <span class="axis-val">${obj.score}</span>
        </div>`;
    }
    card.appendChild(grid);
  }

  // Phase 1 detail
  const p1 = (Array.isArray(phase1) ? phase1 : [phase1]).find(p => p && p.model === r.model);
  if (p1 && (p1.direct_answer || p1.flaw_reason)) {
    const detail = document.createElement('div');
    detail.className = 'phase1-detail';
    detail.textContent = `Direct: ${p1.direct_answer || '—'} | ${p1.flaw_reason || 'No flaw'}`;
    card.appendChild(detail);
  }

  return card;
}

// ── Exports ──

function downloadBackendArtifact(kind, fallbackFn) {
  const artifacts = lastPayload?.data?.artifacts;
  const relpath = artifacts?.[kind];
  if (!relpath) { if (fallbackFn) fallbackFn(); return; }
  fetch(`/api/artifact?path=${encodeURIComponent(relpath)}`, { headers: authHeaders() })
    .then(async res => {
      if (!res.ok) throw new Error(`${res.status}`);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = relpath.split('/').pop();
      a.click();
      URL.revokeObjectURL(a.href);
    })
    .catch(() => { if (fallbackFn) fallbackFn(); });
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

$('exportNdjsonBtn').onclick = () => {
  downloadBackendArtifact('ndjson', () => {
    if (!lastPayload?.data?.questions) return;
    const lines = [];
    lastPayload.data.questions.forEach(q => {
      (q.replies || []).forEach(r => {
        lines.push(JSON.stringify({
          question_index: q.question_index, question_text: q.question_text,
          model: r.model, text: r.text, original_text: r.original_text || null,
          flip: r.flip || null, compliant: r.compliant, conviction_bonus: r.conviction_bonus ?? null,
          weighted_score: r.weighted_score, phase1: r.phase1 || null, axis_scores: r.axis_scores || null,
          phase2_consensus: q.phase2?.consensus || null,
          strongest_weighted: q.strongest_weighted || null, weakest_weighted: q.weakest_weighted || null,
        }));
      });
    });
    downloadBlob(lines.join('\n') + '\n', 'council_replies.ndjson', 'application/x-ndjson');
  });
};

$('exportSummaryBtn').onclick = () => {
  downloadBackendArtifact('summary', () => {
    if (!lastPayload?.data?.summary) return;
    downloadBlob(JSON.stringify(lastPayload.data.summary, null, 2), 'summary.json', 'application/json');
  });
};

$('exportGroupedBtn').onclick = () => {
  downloadBackendArtifact('grouped', () => {
    if (!lastPayload?.data?.questions) return;
      const run = {
      run_id: lastPayload.data.run_id || null, code_hash: lastPayload.data.code_hash || null, mode: lastPayload.data.mode || null,
      timestamp: new Date().toISOString(), questions: []
    };
    lastPayload.data.questions.forEach(q => {
      const qObj = {
        index: q.question_index, text: q.question_text,
        phase2: q.phase2 || null,
        consensus: q.phase2?.consensus || null,
        strongest_weighted: q.strongest_weighted || null, weakest_weighted: q.weakest_weighted || null,
        verdict: q.verdict || null, replies: []
      };
      (q.replies || []).forEach(r => {
        const flip = (r.flip && typeof r.flip === 'object') ? r.flip : { flip: r.flip || false };
        qObj.replies.push({
          model: r.model, original: r.original_text || null, final: r.text || null,
          flip: !!flip.flip, flip_reason: flip.flip_reason || null, flip_source: flip.flip_source || null,
          compliant: r.compliant, conviction_bonus: r.conviction_bonus ?? null,
          weighted_score: r.weighted_score, phase1: r.phase1 || null, axes: r.axis_scores || null,
        });
      });
      run.questions.push(qObj);
    });
    downloadBlob(JSON.stringify(run, null, 2), 'grouped.json', 'application/json');
  });
};

// ── Util ──

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '...' : str;
}

$('councilMode').addEventListener('change', syncModeUI);
syncModeUI();

// ── Tab switching ──

function showTab(tab) {
  $('results').style.display = tab === 'results' ? 'block' : 'none';
  $('dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
  $('tabResults').style.borderColor = tab === 'results' ? 'var(--accent-purple)' : 'var(--border)';
  $('tabResults').style.color = tab === 'results' ? 'var(--text)' : 'var(--text-dim)';
  $('tabDashboard').style.borderColor = tab === 'dashboard' ? 'var(--accent-purple)' : 'var(--border)';
  $('tabDashboard').style.color = tab === 'dashboard' ? 'var(--text)' : 'var(--text-dim)';
  if (tab === 'dashboard') loadDashboard();
}

// ── Dashboard ──

async function loadDashboard() {
  $('dashboardLoading').style.display = 'block';
  $('dashboardContent').style.display = 'none';
  try {
    const mode = encodeURIComponent(activeCouncilMode());
    const res = await fetch(`/api/dashboard?mode=${mode}`, { headers: authHeaders() });
    if (!res.ok) {
      $('dashboardLoading').innerHTML = '<div>No aggregate data available. Run the aggregator first.</div>';
      return;
    }
    const data = await res.json();
    if (data.error) {
      $('dashboardLoading').innerHTML = `<div>${escapeHtml(data.error === 'aggregate_missing' ? 'No aggregate data. Run the orchestrator or aggregator to generate.' : data.error)}</div>`;
      return;
    }
    $('dashboardLoading').style.display = 'none';
    $('dashboardContent').style.display = 'block';
    renderDashboard(data.aggregate);
  } catch (e) {
    $('dashboardLoading').innerHTML = `<div>${escapeHtml(`Error loading dashboard: ${e}`)}</div>`;
  }
}

function renderDashboard(agg) {
  const el = $('dashboardContent');
  el.innerHTML = '';
  const summary = agg.summary || {};
  const models = Object.keys(summary).sort();
  const byDomain = agg.by_domain || {};
  const domains = Object.keys(byDomain).sort();

  if (!models.length) { el.innerHTML = '<div class="results-empty">No model data in aggregate.</div>'; return; }

  // Stat cards
  const grid = document.createElement('div');
  grid.className = 'dash-grid';
  models.forEach(m => {
    const s = summary[m];
    const color = modelColor(m) || '#94a3b8';
    const net = (s.strongest_count || 0) - (s.weakest_count || 0);
    const flipPct = ((s.flip_rate || 0) * 100).toFixed(0);
    grid.innerHTML += `<div class="dash-stat">
      <div class="dash-stat-value" style="color:${color}">${(s.avg_score || 0).toFixed(1)}</div>
      <div class="dash-stat-label">${escapeHtml(m)}</div>
      <div class="dash-stat-sub">Flip: ${flipPct}% · Net: ${net >= 0 ? '+' : ''}${net} · N=${s.n_replies || 0}</div>
    </div>`;
  });
  el.appendChild(grid);

  // Scores table
  const scoresSection = document.createElement('div');
  scoresSection.className = 'dash-section';
  scoresSection.innerHTML = '<h3>Overall Weighted Scores</h3>';
  let table = '<table class="dash-table"><tr><th>Model</th><th>Mean</th><th>StdDev</th><th>Replies</th><th>Strongest</th><th>Weakest</th><th>Net</th></tr>';
  models.forEach(m => {
    const s = summary[m]; const color = modelColor(m) || '#94a3b8';
    const net = (s.strongest_count || 0) - (s.weakest_count || 0);
    const netStyle = net > 0 ? 'color:var(--accent-green)' : (net < 0 ? 'color:var(--accent-red)' : '');
    table += `<tr><td style="color:${color};font-weight:700">${escapeHtml(m)}</td><td>${(s.avg_score||0).toFixed(1)}</td><td>${(s.std_score||0).toFixed(1)}</td><td>${s.n_replies||0}</td><td>${s.strongest_count||0}</td><td>${s.weakest_count||0}</td><td style="font-weight:700;${netStyle}">${net>=0?'+':''}${net}</td></tr>`;
  });
  scoresSection.innerHTML += table + '</table>';
  el.appendChild(scoresSection);

  // Axes
  const allAxes = [...new Set(models.flatMap(m => Object.keys(summary[m].axes || {})))].sort();
  if (allAxes.length) {
    const axSection = document.createElement('div');
    axSection.className = 'dash-section';
    axSection.innerHTML = '<h3>Axis Score Averages</h3>';
    let ax = '<table class="dash-table"><tr><th>Model</th>' + allAxes.map(a => `<th>${escapeHtml(AXIS_SHORT[a]||a)}</th>`).join('') + '</tr>';
    models.forEach(m => {
      const color = modelColor(m) || '#94a3b8'; const axes = summary[m].axes || {};
      ax += `<tr><td style="color:${color};font-weight:700">${escapeHtml(m)}</td>`;
      allAxes.forEach(a => { const v = axes[a]; ax += `<td style="text-align:center;background:rgba(52,211,153,${v?(v/5)*0.2:0})">${v!==undefined?v.toFixed(2):'—'}</td>`; });
      ax += '</tr>';
    });
    axSection.innerHTML += ax + '</table>';
    el.appendChild(axSection);
  }

  // Flips
  const flipSection = document.createElement('div');
  flipSection.className = 'dash-section';
  flipSection.innerHTML = '<h3>Flip Behavior</h3>';
  let ft = '<table class="dash-table"><tr><th>Model</th><th>Flip Rate</th><th>Uncited</th><th>Conviction</th></tr>';
  models.forEach(m => {
    const s = summary[m]; const color = modelColor(m) || '#94a3b8';
    const fp = ((s.flip_rate||0)*100).toFixed(1); const up = ((s.uncited_flip_rate||0)*100).toFixed(1);
    const b = s.avg_conviction_bonus || 0;
    ft += `<tr><td style="color:${color};font-weight:700">${escapeHtml(m)}</td><td style="color:${fp>25?'var(--accent-red)':fp>15?'var(--accent-yellow)':'var(--accent-green)'}">${fp}%</td><td>${up}%</td><td style="color:${b>1?'var(--accent-green)':b>0?'var(--accent-yellow)':'var(--accent-red)'}">${b>=0?'+':''}${b.toFixed(2)}</td></tr>`;
  });
  flipSection.innerHTML += ft + '</table>';
  el.appendChild(flipSection);

  // Domains
  if (domains.length > 1) {
    const domSection = document.createElement('div');
    domSection.className = 'dash-section';
    domSection.innerHTML = '<h3>Scores by Domain</h3>';
    domains.forEach(d => {
      const dd = byDomain[d]; const dm = models.filter(m => dd[m]);
      if (!dm.length) return;
      let dt = `<div style="margin-bottom:6px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px">${escapeHtml(d.replace(/_/g,' '))}</div>`;
      dt += '<table class="dash-table"><tr><th>Model</th><th>Mean</th><th>StdDev</th><th>N</th></tr>';
      dm.forEach(m => { const s = dd[m]; dt += `<tr><td style="color:${modelColor(m)||'#94a3b8'};font-weight:700">${escapeHtml(m)}</td><td>${(s.avg_score||0).toFixed(1)}</td><td>${(s.std_score||0).toFixed(1)}</td><td>${s.n_replies||0}</td></tr>`; });
      domSection.innerHTML += dt + '</table>';
    });
    el.appendChild(domSection);
  }

  // Discriminative power
  const disc = agg.question_discriminative || {};
  const dk = Object.keys(disc);
  if (dk.length) {
    const ds = document.createElement('div');
    ds.className = 'dash-section';
    ds.innerHTML = '<h3>Question Discriminative Power</h3>';
    let dt = '<table class="dash-table"><tr><th>Spread</th><th>Runs</th><th>Question</th></tr>';
    dk.sort((a,b) => (disc[b].score_spread||0) - (disc[a].score_spread||0)).slice(0,15).forEach(q => {
      const info = disc[q]; const sp = info.score_spread||0;
      const tag = sp>=3?'HIGH':sp>=1.5?'MED':'LOW';
      const cls = sp>=3?'color:var(--accent-green)':sp>=1.5?'color:var(--accent-yellow)':'';
      dt += `<tr><td style="font-weight:700;${cls}">${sp.toFixed(2)} ${tag}</td><td>${info.n_runs||0}</td><td style="font-size:12px">"${escapeHtml(truncate(q,70))}..."</td></tr>`;
    });
    ds.innerHTML += dt + '</table>';
    el.appendChild(ds);
  }

  // Consensus stability
  const stab = agg.consensus_stability || {};
  const sk = Object.keys(stab);
  if (sk.length) {
    const ss = document.createElement('div');
    ss.className = 'dash-section';
    ss.innerHTML = '<h3>Consensus Stability</h3>';
    let st = '<table class="dash-table"><tr><th>Stability</th><th>Runs</th><th>Question</th><th>Dominant</th></tr>';
    sk.sort((a,b) => (stab[a].stability||0) - (stab[b].stability||0)).slice(0,15).forEach(q => {
      const info = stab[q]; const r = info.stability||0;
      const tag = r>=0.8?'STABLE':r>=0.5?'MIXED':'UNSTABLE';
      const cls = r>=0.8?'color:var(--accent-green)':r>=0.5?'color:var(--accent-yellow)':'color:var(--accent-red)';
      st += `<tr><td style="font-weight:700;${cls}">${(r*100).toFixed(0)}% ${tag}</td><td>${info.n_runs||0}</td><td style="font-size:12px">"${escapeHtml(truncate(q,55))}..."</td><td style="font-size:12px">${escapeHtml(truncate(info.dominant_label||'',35))}</td></tr>`;
    });
    ss.innerHTML += st + '</table>';
    el.appendChild(ss);
  }
}

</script>
